<body>
  <div class="game-board">

    <img src="src/assets/bird.gif" class="avion">

  <audio controls preload="metadata" class="audio-jump" hidden="true">

  <audio controls preload="metadata" class="audio-game-over" hidden="true">
    <source src="src/assets/game-over-sound.mp3">
  </audio>

  <div class="border">
  </div>
  
</body>

<script>
  console.log("Oh...Un dev ! Ca faisait bien longtemps ! Bienvenue dans mon CV !")
  let myscore = 0;
  let gameRunning = false;
  let cvOpened = false;
  let music_mute = true

  const images = {
    personnage: "src/assets/game-over.gif",
    cloud: [
    'src/assets/cloud-2.png',
    'src/assets/cloud-3.png',
    'src/assets/cloud-4.png',
    'src/assets/cloud-5.png'
    ],
    avion: [
    'src/assets/bird.gif'
    ],
    obstacles: [
    'src/assets/barrier-2.png',
    'src/assets/barrier-4.png',
    'src/assets/barrier-1.png',
    'src/assets/barrier-6.png',
    'src/assets/pngegg.png',
    'src/assets/barrier-5.png',
    'src/assets/barrier-7.png',
    ],
    cv: {
      openButton: 'src/assets/bulle-1.png',
      closeButton: 'src/assets/bulle-2.png',
    },
  }

  
  // Elements
  const background = document.querySelector(".background");
  const modal = document.getElementById("modal");
  const scoreDisplay = document.getElementById('scoreDisplay');
  const music = document.querySelector('.music');
  const audio_jump = document.querySelector('.audio-jump');
  const audio_game_over = document.querySelector('.audio-game-over');
  const personnage = document.querySelector(".personnage");
  const refresh = document.querySelector(".refresh");
  const timerDisplay = document.getElementById('timerDisplay');
  const barrier = document.querySelector(".barrier");
  const language = document.querySelector(".language");
  const audio = document.querySelector(".audio");
  const bulle = document.querySelector(".bulle");
  const pause = document.querySelector(".pause");
  const start_button = document.querySelector(".start-button")
  const gameBoard = document.querySelector('.game-board');
  const clouds = document.querySelector('.clouds');
  const avion = document.querySelector('.avion');
  const border = document.querySelector('.border');
  
  audio_jump.load();
  audio_game_over.load();

  function game_loop(){
  const loop = setInterval(() => {
    console.log(gameRunning)
    if (gameRunning){
      myscore = myscore + 1;
      scoreDisplay.innerHTML = `Score : ${myscore} m`;
      const barrierPosition = barrier.offsetLeft;
      const personnagePosition = +window.getComputedStyle(personnage).bottom.replace("px", "");
      if (barrierPosition > 0 && barrierPosition < 60 && personnagePosition < barrier.offsetHeight + border.offsetHeight) {
        if (!music_mute){
        audio_game_over.currentTime = 0;
        audio_game_over.play();
        }
        barrier.style.left = `${barrierPosition}px`;

        personnage.src = images.personnage;
        bulle.style.display = "block";
        background.classList.add('gameover');
        personnage.style.width = "10vh";
        gameRunning = false
        clearInterval(loop);
      }
    }
  }, 10)
}



  // Game functions
  function jump() {
    if (gameRunning){
      personnage.classList.add('jump');
      if (!music_mute){
        audio_jump.currentTime = 0;
        audio_jump.play();
      }
      setTimeout(() => {
        console.log("jump remove")
        personnage.classList.remove('jump');
      }, 600)
    }
  }
  function toggleImage() {
    cvOpened = !cvOpened;
    document.querySelector('.bulle').src = cvOpened ? images.cv.closeButton : images.cv.openButton;
  };
  function toggleMusic() {
    if (audio.paused) {
      audio.play();
      music.classList.remove('fa-volume-xmark');
      music.classList.add('fa-volume-low');
      music_mute = false
    } else {
      audio.pause();
      music.classList.remove('fa-volume-low');
      music.classList.add('fa-volume-xmark');
      music_mute = true
    }
  }
  function togglePlay() {
    if (pause.classList.contains("fa-play")) {
      game_loop()
      start_button.style.display = "none"
      gameRunning = true;
      pause.classList.remove('fa-play');
      pause.classList.add('fa-pause');
      clouds.style.animationPlayState = 'running';
      avion.style.animationPlayState = 'running';
      barrier.style.animationPlayState = 'running';
      background.classList.remove('gameover');      
    } else {
      gameRunning = false;
      pause.classList.remove('fa-pause');
      pause.classList.add('fa-play');
      clouds.style.animationPlayState = 'paused';
      avion.style.animationPlayState = 'paused';
      barrier.style.animationPlayState = 'paused';
      
    }
  }
  function resetGame() {
  myscore = 0;
  gameRunning = false;
  cvOpened = false;
  scoreDisplay.innerHTML = 'Score : 0 m';
  personnage.classList.remove('jump');
  personnage.src = 'src/assets/personnage.gif';
  personnage.style.width = '12vh';
  bulle.style.display = 'none';
  const initialBarrierPosition = window.innerWidth - 200; 
  barrier.style.right = `${initialBarrierPosition}px`;
  barrier.style.left = '';
  clouds.style.animationPlayState = 'paused';
  avion.style.animationPlayState = 'paused';
  barrier.style.animationPlayState = 'paused';
  start_button.style.display = "block";
  pause.classList.remove('fa-pause');
  pause.classList.add('fa-play');
  barrier.style.animation = 'none';
  barrier.offsetHeight;
  barrier.style.animation = null;
  clouds.style.animation = 'none';
  clouds.offsetHeight;
  clouds.style.animation = null;
  barrier.src = "src/assets/barrier-3.png";
  clouds.src = "src/assets/cloud-1.png"
}
  // Listeners
  document.addEventListener("keydown", jump);
  
  document.addEventListener('DOMContentLoaded', function() {
    const imageSources = images.cloud;

    const clouds = document.querySelector(".clouds");
    let currentImageIndex = 0;
    function changeImage() {
      clouds.src = imageSources[currentImageIndex];
      currentImageIndex = (currentImageIndex + 1) % imageSources.length;
    }

    setInterval(() => {
      const cloudsPosition = clouds.offsetLeft;
      if (cloudsPosition + clouds.clientWidth < 0 ) {
        changeImage();
      }
    }, 200)
  });

  document.addEventListener('DOMContentLoaded', function() {
    const avionImage = images.avion;

    const avion = document.querySelector(".avion");
    let currentImageIndex = 0;
    function changeImage() {
      avion.src = avionImage[currentImageIndex];
      currentImageIndex = (currentImageIndex + 1) % avionImage.length;
    }
    if (currentImageIndex === 0) {
      avion.classList.add('bird');
    } else {
      avion.classList.remove('bird');
    }

    setInterval(() => {
      const avionPosition = avion.offsetLeft;
      if (avionPosition + avion.clientWidth < 0 ) {
        changeImage();
      }
    }, 200)
  });
  
  document.addEventListener('DOMContentLoaded', function() {
    const imageObstacles = images.obstacles;
    const barrier = document.querySelector(".barrier");
    let currentImageIndex = 0;
    function changeObstacle() {
      barrier.src = imageObstacles[currentImageIndex];
      currentImageIndex = (currentImageIndex + 1) % imageObstacles.length;
    }
    setInterval(() => {
      const barrierPosition = barrier.offsetLeft;
      if (barrierPosition + barrier.clientWidth < 0 ) {
        changeObstacle();
      }
    }, 200)
  });
  document.body.addEventListener('touchstart', function(event) {
    if (!event.target.closest('.start-button')) {
      jump();
    }
  });
  document.addEventListener("DOMContentLoaded", function() {
    const urlParams = new URLSearchParams(window.location.search);
    const backgroundParam = urlParams.get('background');
    const backgroundDiv = document.getElementById("background");

    if (backgroundParam === 'image1') {
      backgroundDiv.style.backgroundImage = "src/assets/barrier-4.png')";
    } else if (backgroundParam === 'image2') {
      backgroundDiv.style.backgroundImage = "src/assets/barrier-4.png')";
    }
  });
  // Onclicks

  bulle.onclick = function () {
    modal.style.visibility = (modal.style.visibility == "visible") ? "hidden" : "visible";
    toggleImage()
  };
  music.onclick = function () {
    toggleMusic()
  };
  pause.onclick = function () {
    togglePlay()
  };
  start_button.onclick = function () {
    togglePlay()
    start_button.style.display = "none"
    
  }
  refresh.onclick = function () {
    resetGame();
  };

// fixer bug quand on clic sur menu ca jump téléphone
// Ajouter animations 
</script>
